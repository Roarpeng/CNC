version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudcam-postgres
    environment:
      - POSTGRES_DB=cloudcam
      - POSTGRES_USER=cloudcam
      - POSTGRES_PASSWORD=cloudcam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cloudcam-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    image: python:3.12-slim
    container_name: cloudcam-backend
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://cloudcam:cloudcam@postgres:5432/cloudcam
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    container_name: cloudcam-worker
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && celery -A celery_app.celery_app worker -l info -Q celery"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://cloudcam:cloudcam@postgres:5432/cloudcam
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
